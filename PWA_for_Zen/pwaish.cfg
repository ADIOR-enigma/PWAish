// skip 1st line
try {
  let cmanifest = Cc['@mozilla.org/file/directory_service;1'].getService(Ci.nsIProperties).get('UChrm', Ci.nsIFile);
  cmanifest.append('utils');
  cmanifest.append('chrome.manifest');
  
  if (cmanifest.exists()) {
    Components.manager.QueryInterface(Ci.nsIComponentRegistrar).autoRegister(cmanifest);
    ChromeUtils.importESModule('chrome://userchromejs/content/boot.sys.mjs');
  }
} catch (ex) {};

// PWAish Standalone Autoconfig Handler - START
(function initPWAishCommandLineHandler() {
  let srv = globalThis.Services;
  if (!srv) {
    try {
      srv = ChromeUtils.importESModule("resource://gre/modules/Services.sys.mjs").Services;
    } catch (e) {}
  }
  if (!srv) return;

  const handledCmdLines = new WeakSet();

  function launchStandalonePWA(url, dimensions) {
    dump("[PWAish] Launching standalone PWA window for: " + url + "\n");

    let features = `chrome,dialog=no,all=no,location=no,toolbar=no,menubar=no,status=no,personalbar=no,extrachrome=no,resizable,minimizable,titlebar,close,width=${dimensions.width},height=${dimensions.height}`;

    let args = Cc["@mozilla.org/array;1"].createInstance(Ci.nsIMutableArray);
    let str = Cc["@mozilla.org/supports-string;1"].createInstance(Ci.nsISupportsString);
    str.data = url;
    args.appendElement(str);

    let parentWin = null;
    try {
      parentWin = srv.appShell ? srv.appShell.hiddenDOMWindow : null;
    } catch (e) {}

    let winName = "pwaish_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    let win = srv.ww.openWindow(
      parentWin,
      "chrome://browser/content/browser.xhtml",
      winName,
      features,
      args
    );

    function applyChromeless() {
      try {
        if (!win || win.closed) return;
        win.document.documentElement.setAttribute(
          "chromehidden",
          "menubar toolbar location directories status extrachrome"
        );

        let navToolbox = win.document.getElementById("navigator-toolbox");
        if (navToolbox) {
          navToolbox.setAttribute(
            "chromehidden",
            "menubar toolbar location directories status extrachrome"
          );
        }
      } catch (err) {}
    }

    win.addEventListener(
      "DOMContentLoaded",
      function onDCL() {
        win.removeEventListener("DOMContentLoaded", onDCL);
        applyChromeless();
      },
      false
    );

    win.addEventListener(
      "load",
      function onLoad() {
        win.removeEventListener("load", onLoad);
        dump("[PWAish] Standalone window loaded, applying chromeless UI.\n");
        applyChromeless();
        win.setTimeout(applyChromeless, 50);
        win.setTimeout(applyChromeless, 250);
      },
      false
    );
  }

  function handleCommandLine(cmdLine) {
    if (!cmdLine || typeof cmdLine !== "object" || handledCmdLines.has(cmdLine)) return false;

    let targetUrl = null;
    let width = 1024;
    let height = 768;

    let len = cmdLine.length || 0;
    let flags = ["app", "pwa", "webapp"];
    for (let flag of flags) {
      try {
        let val = cmdLine.handleFlagWithParam(flag, false);
        if (val) {
          targetUrl = val;
          break;
        }
      } catch (e) {}
    }

    if (!targetUrl) {
      try {
        for (let i = 0; i < len; i++) {
          let arg = cmdLine.getArgument(i);
          if (arg && arg.includes("launcher.html") && arg.includes("url=")) {
            let qIdx = arg.indexOf("?");
            if (qIdx !== -1) {
              let params = new URLSearchParams(arg.substring(qIdx));
              let u = params.get("url");
              if (u) {
                targetUrl = u;
                let w = parseInt(params.get("width"));
                let h = parseInt(params.get("height"));
                if (!isNaN(w) && w > 0) width = w;
                if (!isNaN(h) && h > 0) height = h;
                try {
                  cmdLine.removeArguments(i, 1);
                } catch (e) {}
                break;
              }
            }
          }
        }
      } catch (e) {}
    }

    if (targetUrl) {
      try {
        handledCmdLines.add(cmdLine);
      } catch (e) {}

      try {
        let wFlag = cmdLine.handleFlagWithParam("width", false);
        let hFlag = cmdLine.handleFlagWithParam("height", false);
        if (wFlag && !isNaN(parseInt(wFlag))) width = parseInt(wFlag);
        if (hFlag && !isNaN(parseInt(hFlag))) height = parseInt(hFlag);
      } catch (e) {}

      try {
        cmdLine.preventDefault = true;
      } catch (e) {}

      while (cmdLine.length > 0) {
        try {
          cmdLine.removeArguments(0, 1);
        } catch (e) {
          break;
        }
      }

      dump("[PWAish] Intercepted PWA launch for URL: " + targetUrl + "\n");
      launchStandalonePWA(targetUrl, { width, height });
      return true;
    }
    return false;
  }

  try {
    const Handler = {
      QueryInterface: ChromeUtils.generateQI([
        "nsICommandLineHandler",
        "nsICommandLineValidator",
        "nsISupports"
      ]),
      validate(cmdLine) {
        try {
          handleCommandLine(cmdLine);
        } catch (ex) {
          dump("[PWAish] CLI validator error: " + ex + "\n");
        }
      },
      handle(cmdLine) {
        try {
          handleCommandLine(cmdLine);
        } catch (ex) {
          dump("[PWAish] CLI handler error: " + ex + "\n");
        }
      },
      helpInfo: "  --app <url>       Open standalone PWA window.\n",
    };

    const factory = {
      createInstance(...args) {
        let iid = args.length > 1 ? args[1] : args[0];
        return Handler.QueryInterface(iid);
      },
    };

    const cid = Components.ID("{b5204481-2292-411a-a82f-8a03ca2c3be4}");
    const contractId = "@pwaish.org/commandlinehandler;1";

    Components.manager
      .QueryInterface(Ci.nsIComponentRegistrar)
      .registerFactory(cid, "PWAish CLI Handler", contractId, factory);

    srv.catMan.addCategoryEntry(
      "command-line-validator",
      "a-pwaish",
      contractId,
      false,
      true
    );

    srv.catMan.addCategoryEntry(
      "command-line-handler",
      "a-pwaish",
      contractId,
      false,
      true
    );
  } catch (err) {
    dump("[PWAish] Component registration error: " + err + "\n");
  }

  const Observer = {
    observe(subject, topic, data) {
      if (
        topic !== "command-line-startup" &&
        topic !== "command-line-validator" &&
        topic !== "final-ui-startup"
      ) {
        return;
      }
      try {
        if (subject && typeof subject.QueryInterface === "function") {
          let cmdLine = subject.QueryInterface(Ci.nsICommandLine);
          handleCommandLine(cmdLine);
        }
      } catch (ex) {
        dump("[PWAish] Command line intercept error: " + ex + "\n");
      }
    },
  };

  srv.obs.addObserver(Observer, "command-line-startup", false);
  srv.obs.addObserver(Observer, "command-line-validator", false);
  srv.obs.addObserver(Observer, "final-ui-startup", false);
})();
// PWAish Standalone Autoconfig Handler - END
